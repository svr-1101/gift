<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Марины</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Courier+New&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #ff007f;
            --deep-pink: #ff0055;
            --neon-glow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 30px #ff007f;
            --text-glow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--main-pink), 0 0 30px var(--main-pink), 0 0 40px var(--main-pink);
        }

        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1a000a 0%, #000 100%); color: var(--main-pink); font-family: 'Montserrat', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; perspective: 2000px; }

        #bg-layers { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        
        #matrix-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; font-family: 'Courier New', monospace; opacity: 0.3; }
        .matrix-char { position: absolute; color: var(--deep-pink); font-size: 20px; animation: fall linear infinite; text-shadow: var(--neon-glow); }
        @keyframes fall { to { transform: translateY(100vh); } }

        #bokeh-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; }
        .bokeh { position: absolute; background: var(--main-pink); border-radius: 50%; opacity: 0.1; filter: blur(20px); animation: floatBokeh linear infinite; }
        @keyframes floatBokeh { from { transform: translateY(100vh) scale(0.5); } to { transform: translateY(-10vh) scale(1.5); } }

        #container { text-align: center; z-index: 10; }
        
        #countdown, #text-message { font-size: 5em; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: var(--text-glow); filter: drop-shadow(0 0 10px rgba(255,0,127,0.5)); }
        
        .hidden { display: none; opacity: 0; transform: scale(0.5); }
        
        .fade-in-out { animation: fadeInOut 2s ease-in-out forwards; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.5) translateY(30px); filter: blur(10px); }
            20% { opacity: 1; transform: scale(1.05) translateY(0); filter: blur(0); }
            80% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.2) translateY(-30px); filter: blur(10px); }
        }

        #book-container { position: relative; width: 320px; height: 450px; cursor: pointer; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20; box-shadow: 0 0 50px rgba(255, 0, 127, 0.3); }
        #book-container:hover { transform: scale(1.05) rotateX(5deg); }
        
        #book { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        #book.open { transform: rotateY(-180deg); }
        
        .page { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 15px; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid var(--main-pink); box-shadow: inset 0 0 30px rgba(255, 0, 127, 0.3), var(--neon-glow); overflow: hidden; }
        
        .front { z-index: 2; transform: rotateY(0deg); background: #000; }
        .back { transform: rotateY(180deg); background: linear-gradient(135deg, #0d0d0d 0%, #000 100%); padding: 30px; box-sizing: border-box; }
        
        /* Твоя обложка на всю лицевую сторону (без прозрачности) */
        .book-cover-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('cover.jpg'); background-size: cover; background-position: center; opacity: 1; z-index: 1; }

        .back-message { font-size: 1.8em; line-height: 1.4; text-shadow: var(--neon-glow); margin-bottom: 20px; color: #fff; text-align: center; }

        #burst-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 30; }
        .particle { position: absolute; background: var(--main-pink); border-radius: 50%; box-shadow: var(--neon-glow); opacity: 0; }
        @keyframes burstParticle { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }

        #heart-gallery { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; animation: galleryPulse 5s infinite ease-in-out; }
        @keyframes galleryPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .gallery-video { position: absolute; width: 75px; height: 75px; object-fit: cover; border-radius: 8px; border: 2px solid var(--main-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.5), var(--neon-glow); opacity: 0; transform: scale(0); animation: videoPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: auto; transition: transform 0.4s; }
        .gallery-video:hover { transform: scale(1.3); z-index: 100; box-shadow: 0 0 30px #fff; border-color: #fff; }
        
        @keyframes videoPopIn { to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="bg-layers">
        <div id="matrix-bg"></div>
        <div id="bokeh-bg"></div>
    </div>

    <div id="burst-container"></div>

    <div id="container">
        <div id="countdown">3</div>
        <div id="text-message" class="hidden"></div>

        <div id="book-container" class="hidden">
            <div id="book">
                <div class="page front">
                    <div class="book-cover-placeholder"></div>
                </div>
                <div class="page back">
                    <div class="back-message">Марина!<br><br>Пусть каждый твой день будет наполнен светом и счастьем!</div>
                </div>
            </div>
        </div>
    </div>

    <div id="heart-gallery" class="hidden"></div>

    <script>
        const matrixBg = document.getElementById('matrix-bg');
        const bokehBg = document.getElementById('bokeh-bg');
        const chars = "ТыОченьКрасиваяМарина";
        const charArray = chars.split("");

        function createMatrixChar() {
            const char = document.createElement('span');
            char.className = 'matrix-char';
            char.innerText = charArray[Math.floor(Math.random() * charArray.length)];
            char.style.left = Math.random() * 100 + 'vw';
            char.style.animationDuration = Math.random() * 3 + 2 + 's';
            matrixBg.appendChild(char);
            setTimeout(() => char.remove(), 5000);
        }
        setInterval(createMatrixChar, 70); 

        function createBokeh() {
            const bokeh = document.createElement('div');
            bokeh.className = 'bokeh';
            const size = Math.random() * 50 + 20 + 'px';
            bokeh.style.width = size;
            bokeh.style.height = size;
            bokeh.style.left = Math.random() * 100 + 'vw';
            bokeh.style.animationDuration = Math.random() * 10 + 10 + 's';
            bokehBg.appendChild(bokeh);
            setTimeout(() => bokeh.remove(), 20000);
        }
        setInterval(createBokeh, 1000);

        const countdownEl = document.getElementById('countdown');
        const textMessageEl = document.getElementById('text-message');
        const bookContainerEl = document.getElementById('book-container');
        const messageParts = ["Ты", "очень", "красивая", "Марина"];
        let partIndex = 0;

        function startSequence() {
            let count = 3;
            countdownEl.style.animation = 'heartBeat 1s infinite'; 
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.classList.add('hidden');
                    setTimeout(() => {
                        textMessageEl.classList.remove('hidden');
                        showNextPart();
                    }, 500);
                }
            }, 1000); 
        }

        function showNextPart() {
            if (partIndex < messageParts.length) {
                textMessageEl.innerText = messageParts[partIndex];
                textMessageEl.classList.remove('fade-in-out');
                void textMessageEl.offsetWidth; 
                textMessageEl.classList.add('fade-in-out');
                partIndex++;
                setTimeout(showNextPart, 2000); 
            } else {
                textMessageEl.classList.add('hidden');
                setTimeout(() => {
                    bookContainerEl.classList.remove('hidden');
                    bookContainerEl.style.animation = 'videoPopIn 1.5s forwards';
                }, 500);
            }
        }

        window.onload = startSequence;

        const bookEl = document.getElementById('book');
        const heartGalleryEl = document.getElementById('heart-gallery');
        const burstContainer = document.getElementById('burst-container');

        function createBurst() {
            const numParticles = 80; 
            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 8 + 4 + 'px';
                particle.style.width = size;
                particle.style.height = size;
                
                particle.style.left = '50%';
                particle.style.top = '50%';
                
                const angle = Math.random() * 2 * Math.PI;
                const dist = Math.random() * 500 + 100; 
                const tx = Math.cos(angle) * dist + 'px';
                const ty = Math.sin(angle) * dist + 'px';
                
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                
                particle.style.animation = `burstParticle ${Math.random() * 0.8 + 0.8}s ease-out forwards`;
                
                burstContainer.appendChild(particle);
                setTimeout(() => particle.remove(), 1600);
            }
        }

        bookContainerEl.addEventListener('click', () => {
            bookEl.classList.toggle('open');
            if (bookEl.classList.contains('open')) {
                setTimeout(createBurst, 600);
                setTimeout(showHeartGallery, 1400); 
            }
        });

        function showHeartGallery() {
            heartGalleryEl.classList.remove('hidden');
            bookContainerEl.classList.add('hidden'); 

            const totalSpots = 25; 
            const userVideos = 6;  

            for (let i = 1; i <= totalSpots; i++) {
                setTimeout(() => {
                    const video = document.createElement('video');
                    
                    let videoIndex = i % userVideos;
                    if (videoIndex === 0) videoIndex = userVideos;
                    
                    video.src = `videos/${videoIndex}.mp4`; 
                    video.className = 'gallery-video';
                    video.autoplay = true;
                    video.loop = true;
                    video.muted = true;
                    video.setAttribute('playsinline', '');

                    const t = (i / totalSpots) * 2 * Math.PI;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                    const scale = 14; 
                    video.style.left = `calc(50% + ${x * scale}px - 37.5px)`; 
                    video.style.top = `calc(50% + ${y * scale}px - 37.5px)`;
                    
                    heartGalleryEl.appendChild(video);
                }, i * 200); 
            }
        }
    </script>
</body>
</html>
